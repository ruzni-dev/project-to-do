<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced To-Do List</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <div class="container">
    <h1>My To-Do List</h1>

    <form class="input-group" id="task-form">
      <input type="text" id="task-input" placeholder="Add a new task..." />
      <input type="date" id="task-date" />
      <button id="add-task" type="submit">Add</button>
    </form>

    <div class="controls">
      <div class="filters">
        <button data-filter="all" class="filter-btn active">All</button>
        <button data-filter="active" class="filter-btn">Active</button>
        <button data-filter="completed" class="filter-btn">Completed</button>
      </div>
      <button id="toggle-theme" type="button">Dark Mode</button>
    </div>

    <ul id="task-list"></ul>
  </div>

  <div class="modal-overlay" id="edit-modal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
      <div class="modal-header">
        <h2 id="edit-modal-title">Edit Task</h2>
        <button class="modal-close" id="close-modal" type="button" aria-label="Close edit modal">×</button>
      </div>

      <form id="edit-form" class="modal-form">
        <label for="edit-task-text">Task</label>
        <input type="text" id="edit-task-text" required />

        <label for="edit-task-date">Due Date</label>
        <input type="date" id="edit-task-date" />

        <div class="modal-actions">
          <button type="button" class="secondary-btn" id="cancel-edit">Cancel</button>
          <button type="submit" class="primary-btn">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Sound Effects -->
  <audio id="sound-add" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
  <audio id="sound-done" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
  <audio id="sound-delete" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

  <script src="assets/js/app.js"></script>
</body>
</html>
